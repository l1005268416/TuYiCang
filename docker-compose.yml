version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tuyicang-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./vector_db:/app/vector_db
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - MILVUS_HOST=${MILVUS_HOST}
      - MILVUS_PORT=${MILVUS_PORT}
      - MILVUS_USER=${MILVUS_USER}
      - MILVUS_PASSWORD=${MILVUS_PASSWORD}
    restart: unless-stopped
    networks:
      - tuyicang-network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: tuyicang-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - tuyicang-network

networks:
  tuyicang-network:
    driver: bridge
